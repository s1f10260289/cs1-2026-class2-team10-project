            <h1>シンガポール</h1>
            <img src="images/top.jpg" alt="シンガポールの写真">
            <p>シンガポールは、東南アジアに位置する小さな島国です。中国系・マレー系・インド系など多様な民族が共存し、それぞれの文化や食が混ざり合うユニークな魅力があります。近代的な都市景観と豊かな自然・歴史が融合したシンガポールは、初めて訪れる方にも安心して楽しめる、アジア屈指の観光地です。</p>
